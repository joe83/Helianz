# =============================================================================
# docker-compose.mono.yml
# =============================================================================
# Runs HelianzServer on Mono 6 + XSP4 alongside a MySQL 8 database.
#
# Usage:
#   docker compose -f docker-compose.mono.yml up --build
#   docker compose -f docker-compose.mono.yml down -v          # tear down + wipe DB
#
# The HelianzServer web service will be reachable at:
#   http://localhost:9390/ServiceMain.asmx
#
# Compare with the Windows/IIS deployment that typically serves on:
#   http://localhost:80/HelianzServer/ServiceMain.asmx
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # MySQL 8  –  Helianz database
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    command: >
      --default-authentication-plugin=mysql_native_password
      --sql-mode=ONLY_FULL_GROUP_BY,STRICT_TRANS_TABLES,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION
    environment:
      MYSQL_ROOT_PASSWORD: rootrootroot       # change before production use
      MYSQL_DATABASE:      helianz
      MYSQL_USER:          oduser
      MYSQL_PASSWORD:      odpass             # must match docker/HelianzServerConfig.Docker.xml
    ports:
      - "3307:3306"     # mapped to 3307 to avoid collision with a local MySQL instance
    volumes:
      - od-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootrootroot"]
      interval: 10s
      timeout: 5s
      retries: 12

  # ---------------------------------------------------------------------------
  # HelianzServer  –  .NET 4.8 middle-tier web service on Mono 6 / XSP4
  # ---------------------------------------------------------------------------
  helianz-server:
    build:
      context: .
      dockerfile: Dockerfile.mono
    image: helianz-server-mono:latest
    ports:
      - "9390:9390"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      # Live-reload the DB config without rebuilding the image:
      #   edit docker/HelianzServerConfig.Docker.xml, then restart the container.
      - ./docker/HelianzServerConfig.Docker.xml:/app/HelianzServerConfig.xml:ro
    restart: unless-stopped

volumes:
  od-mysql-data:
