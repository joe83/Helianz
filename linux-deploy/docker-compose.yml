# =============================================================================
# docker-compose.yml  –  HelianzServer on Mono 6 + MySQL 8
# =============================================================================
# Usage:
#   docker compose up --build       # first time or after Dockerfile change
#   docker compose up -d            # background (uses cached image)
#   docker compose down             # stop
#   docker compose down -v          # stop + wipe database volume
#
# Service endpoint:
#   http://SERVER_IP:9390/ServiceMain.asmx
# =============================================================================

services:

  # ── MySQL 8.0 ────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    command: >
      --default-authentication-plugin=mysql_native_password
      --sql-mode=ONLY_FULL_GROUP_BY,STRICT_TRANS_TABLES,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION
    # Notes on flags:
    #   mysql_native_password      : required by old MySqlConnector in Helianz DLLs
    #                                (MySQL 8.0 default caching_sha2_password is unsupported)
    #   sql_mode without NO_ZERO_DATE / NO_ZERO_IN_DATE:
    #                                Helianz uses 0000-00-00 sentinel dates everywhere;
    #                                MySQL 8.0 strict mode rejects these by default
    environment:
      # SECURITY: Override in a .env file for production. Never commit real passwords.
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootrootroot}
      MYSQL_DATABASE:      helianz
      MYSQL_USER:          oduser
      MYSQL_PASSWORD:      ${DB_PASSWORD:-odpass}
    ports:
      - "3307:3306"   # mapped to 3307 to avoid collision with a local MySQL instance
    volumes:
      - od-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootrootroot"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # ── HelianzServer (Mono 6 / XSP4) ─────────────────────────────────────
  helianz-server:
    build:
      context: ..                          # repo root is the build context
      dockerfile: linux-deploy/Dockerfile
    image: helianz-server-mono:latest
    ports:
      - "9390:9390"
    depends_on:
      mysql:
        condition: service_healthy
    # SECURITY: Pass DB credentials via environment variables instead of config files.
    # These override values in HelianzServerConfig.xml when set.
    environment:
      - HELIANZ_DB_SERVER=${HELIANZ_DB_SERVER:-mysql}
      - HELIANZ_DB_NAME=${HELIANZ_DB_NAME:-helianz}
      - HELIANZ_DB_USER=${HELIANZ_DB_USER:-oduser}
      - HELIANZ_DB_PASSWORD=${DB_PASSWORD:-odpass}
      - HELIANZ_DB_USER_LOW=${HELIANZ_DB_USER_LOW:-oduser}
      - HELIANZ_DB_PASSWORD_LOW=${DB_PASSWORD:-odpass}
    volumes:
      # Bind-mount the config so the hostname resolves to the "mysql" service.
      # Edit config/HelianzServerConfig.xml and restart to change DB settings.
      - ./config/HelianzServerConfig.xml:/app/HelianzServerConfig.xml:ro
    restart: unless-stopped

volumes:
  od-mysql-data:
